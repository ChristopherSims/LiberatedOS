name: Build and lint
on:
  schedule:
      # Run every Sunday at 11 PM UTC
      - cron: '0 23 * * 0'
  #push:
  #  paths:
  #    - 'linux-cachyos/PKGBUILD'
  #    - '.github/workflows/build.yml'
  workflow_dispatch:

env:
  CCACHE_DIR: /home/builder/.ccache

jobs:
  build-kernel:
    name: linux-cachyos (${{ matrix.toolchain }})
    strategy:
      matrix:
        toolchain: [gcc, clang]

    runs-on: ubuntu-latest
    container: archlinux:base-devel
    steps:
    - name: Checkout
      uses: actions/checkout@v4
    - name: Setup build environment
      run: |
          # Use CachyOS repository
          cat << 'EOF' >> /etc/pacman.conf
          [cachyos]
          Server = https://mirror.cachyos.org/repo/x86_64/cachyos
          EOF

          pacman-key --init
          pacman-key --recv-keys F3B607488DB35A47 --keyserver keyserver.ubuntu.com
          pacman-key --lsign-key F3B607488DB35A47
          pacman -Syu --noconfirm --needed ccache

          # Setup builder user
          useradd builder -m
          echo "builder ALL=(ALL) NOPASSWD: ALL" >> /etc/sudoers
          chmod -R a+rw .

          # Use all threads for building
          sed -i 's/#MAKEFLAGS="-j2"/MAKEFLAGS="-j$(nproc) -l$(nproc)"/g' /etc/makepkg.conf

          # Setup a packager name to indicate that kernel has built with CI
          sed -i 's/#PACKAGER=".*"/PACKAGER="CachyOS GitHub Actions"/g' /etc/makepkg.conf

          # Setup ccache
          sed -i 's|!ccache|ccache|' /etc/makepkg.conf
          sudo -u builder mkdir -p ${{ env.CCACHE_DIR }}
    - name: Setup ccache
      id: cache
      uses: actions/cache@v4
      with:
        path: ${{ env.CCACHE_DIR }}
        key: ccache-${{ matrix.toolchain }}-${{ github.run_id }}
        restore-keys: |
          ccache-${{ matrix.toolchain }}
    - name: Build package (${{ matrix.toolchain }})
      id: makepkg
      env:
        _build_zfs: yes
        _build_nvidia_open: yes
        _use_llvm_lto: ${{ matrix.toolchain == 'gcc' && 'none' || 'thin' }}
      run: |
          cd "linux-cachyos"
          sudo -H -E -u builder makepkg --skipchecksums --syncdeps --noconfirm
    - name: Upload package to artifacts
      id: upload
      uses: actions/upload-artifact@v4
      with:
        name: linux-cachyos-${{ matrix.toolchain }}
        path: linux-cachyos/*.pkg.tar.zst*

  build-systemd:
    name: liberated-systemd
    runs-on: ubuntu-latest
    container: archlinux:base-devel
    steps:
    - name: Checkout
      uses: actions/checkout@v4
    - name: Setup build environment
      run: |
          pacman -Syu --noconfirm --needed meson git gperf libxslt python-jinja python-lxml linux-api-headers bash-completion clang llvm libbpf libmicrohttpd libxcrypt libidn2 libgcrypt
          useradd builder -m
          echo "builder ALL=(ALL) NOPASSWD: ALL" >> /etc/sudoers
          chmod -R a+rw /tmp
    - name: Build liberated-systemd packages
      run: |
          mkdir -p /tmp/build-systemd
          cd /tmp/build-systemd
          cat > PKGBUILD <<'PKGBUILD_EOF'
          pkgbase=systemd-liberated
          pkgname=(systemd-liberated systemd-liberated-libs systemd-liberated-resolvconf systemd-liberated-sysvcompat systemd-liberated-ukify)
          pkgver=260.1
          pkgrel=1
          pkgdesc='Liberated system and service manager - no surveillance. Ever.'
          arch=('x86_64')
          url='https://github.com/Jeffrey-Sardina/systemd'
          license=('LGPL-2.1-or-later')
          depends=('acl' 'bash' 'cryptsetup' 'dbus' 'kbd' 'kmod' 'libgcrypt' 'libxcrypt'
                   'libidn2' 'lz4' 'pam' 'libelf' 'libseccomp' 'util-linux' 'xz' 'pcre2'
                   'audit' 'openssl' 'glibc' 'libgcc' 'lz4' 'xz' 'zstd' 'libcap')
          makedepends=('meson' 'git' 'gperf' 'libxslt' 'python-jinja' 'python-lxml'
                       'linux-api-headers' 'bash-completion' 'clang' 'llvm' 'libbpf'
                       'libmicrohttpd' 'libxcrypt' 'libidn2' 'libgcrypt')
          source=("git+https://github.com/Jeffrey-Sardina/systemd.git#branch=main")
          sha512sums=('SKIP')

          pkgver() {
            cd "${srcdir}/systemd" || return 1
            printf '260.1.%s\n' "$(git rev-parse --short HEAD)"
          }

          build() {
            cd "${srcdir}/systemd"
            arch-meson build \
              -Dversion-tag="${pkgver}-${pkgrel}-freeos" \
              -Dmode=release \
              -Dapparmor=enabled \
              -Dbootloader=enabled \
              -Dbpf-framework=enabled \
              -Dima=false \
              -Dlibidn2=enabled \
              -Dlz4=enabled \
              -Dman=enabled \
              -Dselinux=disabled \
              -Ddns-over-tls=openssl \
              -Dfallback-hostname='freeos' \
              -Ddefault-kill-user-processes=false
            meson compile -C build
          }

          package_systemd-liberated() {
            pkgdesc='system and service manager (liberated)'
            depends=("systemd-liberated-libs=${pkgver}" 'acl' 'bash' 'cryptsetup' 'dbus' 'kbd' 'kmod'
                     'libgcrypt' 'libxcrypt' 'libidn2' 'lz4' 'pam' 'libelf' 'libseccomp'
                     'util-linux' 'xz' 'pcre2' 'audit' 'openssl' 'libcap')
            provides=('systemd' 'systemd-tools' 'udev' 'nss-myhostname')
            conflicts=('systemd' 'systemd-tools' 'udev' 'nss-myhostname')
            replaces=('nss-myhostname' 'systemd-tools' 'udev')
            backup=(etc/systemd/coredump.conf
                    etc/systemd/homed.conf
                    etc/systemd/journald.conf
                    etc/systemd/logind.conf
                    etc/systemd/networkd.conf
                    etc/systemd/oomd.conf
                    etc/systemd/pstore.conf
                    etc/systemd/resolved.conf
                    etc/systemd/sleep.conf
                    etc/systemd/system.conf
                    etc/systemd/timesyncd.conf
                    etc/systemd/user.conf
                    etc/udev/udev.conf)
            meson install -C build --destdir "$pkgdir"
            # Strip out libs shipped in -libs subpackage
            mkdir -p systemd-libs
            mv "$pkgdir"/usr/lib/lib{nss,systemd,udev}*.so* systemd-libs/ 2>/dev/null || true
            mv "$pkgdir"/usr/lib/pkgconfig systemd-libs/ 2>/dev/null || true
            mv "$pkgdir"/usr/include systemd-libs/ 2>/dev/null || true
            # Strip out resolvconf shipped in -resolvconf subpackage
            mkdir -p resolvconf
            mv "$pkgdir"/usr/bin/resolvconf resolvconf/ 2>/dev/null || true
            # Strip out sysvcompat shipped in -sysvcompat subpackage
            mkdir -p sysvcompat
            for f in halt init poweroff reboot shutdown; do
              mv "$pkgdir"/usr/bin/$f sysvcompat/ 2>/dev/null || true
            done
            # Strip out ukify shipped in -ukify subpackage
            mkdir -p ukify
            mv "$pkgdir"/usr/bin/ukify ukify/ 2>/dev/null || true
          }

          package_systemd-liberated-libs() {
            pkgdesc='systemd client libraries (liberated)'
            depends=('glibc' 'libgcc' 'libgcrypt' 'lz4' 'xz' 'zstd' 'libcap')
            provides=('libsystemd' 'libsystemd.so' 'libudev.so')
            conflicts=('libsystemd')
            replaces=('libsystemd')
            mkdir -p "$pkgdir/usr/lib"
            if [ -d /tmp/build-systemd/src/systemd-liberated/systemd-libs ]; then
              cp -a /tmp/build-systemd/src/systemd-liberated/systemd-libs/* "$pkgdir/usr/lib/"
            fi
          }

          package_systemd-liberated-resolvconf() {
            pkgdesc='systemd resolvconf replacement (liberated)'
            depends=("systemd-liberated=${pkgver}")
            provides=('openresolv' 'resolvconf')
            conflicts=('resolvconf')
            mkdir -p "$pkgdir/usr/bin"
            if [ -f /tmp/build-systemd/src/systemd-liberated/resolvconf/resolvconf ]; then
              cp -a /tmp/build-systemd/src/systemd-liberated/resolvconf/resolvconf "$pkgdir/usr/bin/"
            fi
          }

          package_systemd-liberated-sysvcompat() {
            pkgdesc='sysvinit compat for systemd (liberated)'
            conflicts=('sysvinit')
            depends=("systemd-liberated=${pkgver}")
            mkdir -p "$pkgdir/usr/bin"
            if [ -d /tmp/build-systemd/src/systemd-liberated/sysvcompat ]; then
              cp -a /tmp/build-systemd/src/systemd-liberated/sysvcompat/* "$pkgdir/usr/bin/"
            fi
          }

          package_systemd-liberated-ukify() {
            pkgdesc='Combine kernel and initrd into a signed UKI (liberated)'
            provides=('ukify')
            depends=("systemd-liberated=${pkgver}" 'binutils' 'python-cryptography' 'python-pefile')
            optdepends=('python-pillow: Show the size of splash image'
                        'sbsigntools: Sign the embedded kernel')
            mkdir -p "$pkgdir/usr/bin"
            if [ -f /tmp/build-systemd/src/systemd-liberated/ukify/ukify ]; then
              cp -a /tmp/build-systemd/src/systemd-liberated/ukify/ukify "$pkgdir/usr/bin/"
            fi
          }
          PKGBUILD_EOF
          chown -R builder /tmp/build-systemd
          sudo -H -E -u builder makepkg --syncdeps --noconfirm
    - name: Upload systemd packages
      uses: actions/upload-artifact@v4
      with:
        name: liberated-systemd
        path: /tmp/build-systemd/*.pkg.tar.zst*

  build-iso:
    name: Build FreeOS ISO
    needs: [build-kernel, build-systemd]
    runs-on: ubuntu-latest
    container:
      image: archlinux:base-devel
      options: --privileged
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup build environment
        run: |
          # Use CachyOS repository
          cat << 'EOF' >> /etc/pacman.conf
          [cachyos]
          Server = https://mirror.cachyos.org/repo/x86_64/cachyos
          EOF

          pacman-key --init
          pacman-key --recv-keys F3B607488DB35A47 --keyserver keyserver.ubuntu.com
          pacman-key --lsign-key F3B607488DB35A47
          pacman -Syu --noconfirm --needed archiso mkinitcpio-archiso squashfs-tools

      - name: Download built kernel packages (GCC)
        uses: actions/download-artifact@v4
        with:
          name: linux-cachyos-gcc
          path: /tmp/freeos-repo

      - name: Download built systemd packages
        uses: actions/download-artifact@v4
        with:
          name: liberated-systemd
          path: /tmp/freeos-repo

      - name: Create local pacman repository
        run: |
          cd /tmp/freeos-repo
          repo-add freeos.db.tar.gz *.pkg.tar.zst

      - name: Prepare FreeOS archiso profile
        run: |
          # Copy the official Arch releng profile as our base
          cp -r /usr/share/archiso/configs/releng /tmp/freeos-profile

          # Replace default Arch kernel with FreeOS kernel
          sed -i 's/^linux$/linux-cachyos-gcc/' /tmp/freeos-profile/packages.x86_64 || true
          sed -i '/^linux-headers$/d' /tmp/freeos-profile/packages.x86_64 || true
          sed -i '/^linux-lts$/d' /tmp/freeos-profile/packages.x86_64 || true
          sed -i '/^linux-lts-headers$/d' /tmp/freeos-profile/packages.x86_64 || true

          # Ensure FreeOS kernel packages are present
          grep -qxF 'linux-cachyos-gcc' /tmp/freeos-profile/packages.x86_64 || echo 'linux-cachyos-gcc' >> /tmp/freeos-profile/packages.x86_64
          grep -qxF 'linux-cachyos-gcc-headers' /tmp/freeos-profile/packages.x86_64 || echo 'linux-cachyos-gcc-headers' >> /tmp/freeos-profile/packages.x86_64

          # Replace default systemd with liberated systemd
          sed -i '/^systemd$/d' /tmp/freeos-profile/packages.x86_64 || true
          sed -i '/^systemd-libs$/d' /tmp/freeos-profile/packages.x86_64 || true
          sed -i '/^systemd-resolvconf$/d' /tmp/freeos-profile/packages.x86_64 || true
          sed -i '/^systemd-sysvcompat$/d' /tmp/freeos-profile/packages.x86_64 || true
          sed -i '/^systemd-ukify$/d' /tmp/freeos-profile/packages.x86_64 || true
          for pkg in systemd-liberated systemd-liberated-libs systemd-liberated-resolvconf systemd-liberated-sysvcompat systemd-liberated-ukify; do
            grep -qxF "$pkg" /tmp/freeos-profile/packages.x86_64 || echo "$pkg" >> /tmp/freeos-profile/packages.x86_64
          done

          # Add our local repo to the profile pacman.conf so mkarchiso can resolve packages
          printf '\n[freeos]\nSigLevel = Optional TrustAll\nServer = file:///tmp/freeos-repo\n' >> /tmp/freeos-profile/pacman.conf

      - name: Build ISO
        run: |
          mkdir -p /tmp/freeos-iso-out
          mkarchiso -v -w /tmp/archiso-work -o /tmp/freeos-iso-out /tmp/freeos-profile

      - name: Upload ISO to artifacts
        uses: actions/upload-artifact@v4
        with:
          name: freeos-desktop-iso
          path: /tmp/freeos-iso-out/*.iso
